<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Cenitpede</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover" />
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#111;color:#eee;font-family:monospace}
body{overflow:hidden;-webkit-tap-highlight-color:transparent}
#wr{position:relative;width:100vw;height:100dvh;display:flex;flex-direction:column;background:#000}
canvas{display:block;background:#1a4927}
#hud{padding:8px calc(8px+env(safe-area-inset-right)) 60px;background:rgba(0,0,0,.5);display:flex;justify-content:space-between;font-size:13px;z-index:3}
#touch{position:absolute;left:4px;top:50%;transform:translateY(-50%);z-index:3;display:none}
@media(hover:hover){#touch{display:none!important}}
.dpad{width:180px;height:172px;position:relative}
.btn{position:absolute;background:#3a6;border:2px solid #579;color:#eee;font-size:24px;display:flex;align-items:center;justify-content:center;border-radius:8px;padding:6px 8px;user-select:none;-webkit-user-select:none;touch-action:none;cursor:pointer}
.btn:active{background:#5a8;border-color:#7b0}
.dpad .up{top:4px;left:50%;transform:translateX(-50%)}
.dpad .down{bottom:4px;left:50%;transform:translateX(-50%)}
.dpad .left{top:50%;left:4px;transform:translateY(-50%)}
.dpad .right{top:50%;right:4px;transform:translateY(-50%)}
.fireBtn{position:absolute;width:68px;height:68px;top:calc(50%-34px);right:-72px;background:#e44;border:2px solid #f77;color:white;font-size:14px;display:flex;align-items:center;justify-content:center;border-radius:8px;-webkit-appearance:none;cursor:pointer;touch-action:none}
.fireBtn:active{background:#d33}
#ovr{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.7);z-index:4;color:#fff;font-size:20px;text-align:center;padding:30px}
#ovr h1{font-size:40px;margin-bottom:16px;color:#f99;letter-spacing:6px;animation:arcadePulse 2.8s ease-in-out infinite}
@keyframes arcadePulse{
  0%,100%{color:#f99;text-shadow:0 0 18px rgba(255,100,0,.3),0 0 4px rgba(255,100,0,.1)}
  50%{color:#ff6;text-shadow:0 0 30px rgba(255,100,0,.5),0 0 8px rgba(255,100,0,.2)}
}
#ovr p{margin:8px 0;font-size:15px;line-height:1.6}
@keyframes promptBlink{
  0%   {opacity:.95 }
  50%  {opacity:.4 }
  100% {opacity:.95}
}
#start-prompt{animation:promptBlink 2s steps(2,start) infinite}
</style>
</head>
<body>
<div id="wr">
<canvas id="cvs" width="320" height="240"></canvas>
<div id="hud"><span>SCORE <b id="sc">0</b></span><span>LIVES <b id="lv">3</b></span><span>WAVE <b id="wg">1</b></span><span>HIGH <b id="hs">0</b></span></div>
<div id="touch">
  <div class="dpad">
    <button class="btn up" data-d="up">&#9650;</button>
    <button class="btn left" data-d="left">&#9664;</button>
    <button class="btn right" data-d="right">&#9654;</button>
    <button class="btn down" data-d="down">&#9660;</button>
  </div>
  <button class="fireBtn" id="fb">FIRE</button>
</div>
<div id="ovr"><h1>CENITPEDE</h1><p id="start-prompt">TAP SCREEN TO START</p><p id="ovrMsg" style="font-size:15px;color:#ff9;margin-top:12px;display:none"></p><p style="font-size:12px;color:#aaa;margin-top:18px;">ARROWS MOVE &middot; Z or SPACE to FIRE</p></div>

<script>
(function(){
"use strict";
var canvas = document.getElementById("cvs");
var ctx = canvas.getContext("2d");
var W = 320, H = 240, DPR = Math.min(window.devicePixelRatio || 1, 2);
canvas.style.width = W + "px";
canvas.style.height = H + "px";

// --- refs ---
var hudSc   = document.getElementById("sc");
var hudLv   = document.getElementById("lv");
var hudWg   = document.getElementById("wg");
var ovrEl   = document.getElementById("ovr");
var fbBtn   = document.getElementById("fb");

// --- game state ---
var player  = { x:160, y:H-24, w:28, h:10, invT:0 };
var bullets = [];
var mush    = [];
var centi   = [];
var fleas   = [];
var spiders = [];
var scorpions = [];
var spiderSpawnTimer = 0;
var fleaSpawnTimer = 0;
var scorpionSpawnTimer = 0;
var SPIDER_SPAWN_INTERVAL = 600; // frames (~9.6s at 60fps)
var SPIDER_HUNT_RANGE = 150;
var SPIDER_SPEED = 2.2;
var SPIDER_SCORE = 75;
var FLEA_SPAWN_INTERVAL = 900;
var FLEA_SPEED = 3.5;
var FLEA_SCORE = 100;
var FLEA_MAX = 2;
var SCORPION_SPAWN_INTERVAL = 1200; // frames (~19.2s at 60fps)
var SCORPION_SPEED = 1.8;
var SCORPION_SCORE = 500;
var score   = 0;
var lives   = 3;
var wave    = 1;
var gameOver= false;
try{var hs=parseInt(localStorage.getItem("cenitpede_hs")||"0",10);if(isNaN(hs))hs=0}catch(e){hs=0}var highScore=hs;
var keys    = {};
var running = false;

// --- particle FX state (bounded, capped at 80) ---
var fxPars   = [];       // {x,y,vx,vy,life,color}
var FX_MAX   = 80;
var FX_LIFE  = 24;       // frames before a particle dies

// --- screen-flash state (bounded cabinet feedback) ---
var flashT   = 0;        // remaining frame count of current flash
var flashColor=null;     // "#fff" hit / "#f44" damage
var FLASH_CAP=6;         // max flash duration in frames

function triggerFlash(color){
  if(!flashColor){
    flashT=1; flashColor=color;
  } else if (flashColor!==color && flashT<FLASH_CAP){
    flashT++; flashColor=color;
  }
}

// --- decrement flash duration once per update, clear when done ---
function updateFlash(){
  if(flashColor&&flashT>0){flashT--;}
  if(!flashT){flashColor=null;}
}

// --- spawn burst of particles at (x,y) ---
function spawnBurst(x, y, color, count){
  for(var i=0;i<count;i++){
    var a=(i/FX_MAX)*Math.PI*2;
    fxPars.push({x:x+5*Math.cos(a),y:y+5*Math.sin(a),vx:5*Math.cos(a)+Math.random()*3-1.5,vy:5*Math.sin(a)+Math.random()*3-1.5,life:FX_LIFE,color});
  }
}

// --- update FX particles each frame; cap at 80; remove dead ---
function updateFx(){
  for(var i=fxPars.length-1;i>=0;i--){
    var p = fxPars[i];
    if(!p) continue;
    p.x += p.vx; p.y += p.vy; p.life--;
    // cap enforcement: oldest particles die first when over limit
    if(fxPars.length > FX_MAX){
      fxPars.splice(0,fxPars.length-FX_MAX);
    }
  }
}

// --- draw FX particles ---
function drawFx(){
  for(var p of fxPars){
    ctx.globalAlpha = Math.max(0,p.life/FX_LIFE);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x-2,p.y-2,4,4);
  }
  ctx.globalAlpha = 1;
}

// --- draw screen flash overlay near end of drawGame() ---
function drawFlash(){
  if(flashT<=0) return;
  ctx.save();
  var r=flashColor==="#fff"?"rgba(255,255,255,"+(flashT/FLASH_CAP)+")":"rgba(255,68,68,"+(flashT/FLASH_CAP)+")";
  ctx.fillStyle=r;ctx.fillRect(0,0,W,H);
  ctx.restore();
}

// --- wire FX into collision events below this line ---
// (bullet-hit, player-damage) triggered by updateFx calls inside loop() and drawGame()

// --- wave management ---
var centiSpawned = 0;       // segments spawned this wave
var centiTarget  = 0;       // total segments to spawn for current wave

// --- WAVE banner state (60-frame centered banner on canvas) ---
var waveBannerT = 0;        // frames remaining for the WAVE banner display

// --- grid config for mushrooms (8 cols × 5 rows, cell=40×24) ---
var MUSH_COLS = 8, MUSH_ROWS = 5;
var MUSH_CW = 40, MUSH_CH = 24;
var MUSH_OFF_X = 20, MUSH_OFF_Y = 16;

// --- poison state constants ---
var POISON_DMG = 3;       // damage per tick to centipede segments
var POISON_TICK = 500;    // ms between poison ticks
var POISON_LIFE = 4000;   // ms a poisoned mushroom stays active

// --- helpers ---
function rnd(a,b){return a+Math.random()*(b-a)}
function rectHit(a,b){ return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y }

// --- input: keyboard (arrows + WASD) ---
(function(){
  var keySet = ["ArrowUp","ArrowDown","ArrowLeft","ArrowRight","KeyW","KeyA","KeyS","KeyD"];
  document.addEventListener("keydown",function(e){if(keySet.indexOf(e.key)>=0){e.preventDefault();keys[e.key]=true;}});
  document.addEventListener("keyup",function(e){if(keySet.indexOf(e.key)>=0){keys[e.key]=false;}});
})();

// --- input: touch dpad buttons (lifecycle-safe) ---
(function(){
  var btnMap = {up:".btn.up",down:".btn.down",left:".btn.left",right:".btn.right"};
  for(var d in btnMap){
    (function(dName, sel){
      var el = document.querySelector(sel); if(!el) return;
      var map = {up:"ArrowUp",down:"ArrowDown",left:"ArrowLeft",right:"ArrowRight"};
      function onEnd(){keys[map[dName]]=false;}
      el.addEventListener("touchstart",function(e){e.preventDefault();e.stopPropagation();keys[map[dName]]=true;});
      el.addEventListener("touchend",onEnd);
      el.addEventListener("touchcancel",onEnd);
      // slide-off-finger: release key if touch moves outside button bounds
      el.addEventListener("touchmove",function(ev){
        var t=ev.changedTouches[0]; if(!t) return;
        var r=el.getBoundingClientRect();
        if(t.clientX<r.left||t.clientX>r.right||t.clientY<r.top||t.clientY>r.bottom){onEnd();}
      });
    })(d,d);
  }
})();

// --- input: FIRE button + keyboard Z/Space ---
(function(){
  fbBtn.addEventListener("touchstart",function(e){e.preventDefault();e.stopPropagation();fireBullet();});
  fbBtn.addEventListener("click",function(){fireBullet();});
  document.addEventListener("keydown",function(e){if(e.key==="z"||e.key==="Z"){e.preventDefault();fireBullet();}});
})();

// --- overlay: tap to start/restart ---
(function(){
  ovrEl.addEventListener("touchstart",function(e){e.preventDefault();startGame();});
  ovrEl.addEventListener("mousedown",function(){startGame();});
})();

// --- shoot (regular or poisoned based on nearby mushrooms) ---
function fireBullet(){
  if(!running) return;
  var poisoned = false;
  // check if player is near a poisoned mushroom → fire poisoned bullet
  for(var i=0;i<mush.length;i++){
    var m=mush[i];
    if(m.poisoned){
      var dx=player.x-m.x, dy=player.y-m.y;
      if(Math.sqrt(dx*dx+dy*dy)<MUSH_CW*1.5){ poisoned=true; break; }
    }
  }
  bullets.push({x:player.x, y:player.y-4, w:6, h:10, spd:poisoned?4:6.5, poisoned:poisoned, pTimer:0});
  playSfx("fire");
}

// --- audio manager (lazy Web Audio API, no-op if unavailable) ---
var audioCtx = null;
function initAudio(){
  if(audioCtx) return;
  try{
    var Ctx = window.AudioContext || window.webkitAudioContext;
    if(Ctx){
      audioCtx = new Ctx();
    }
  }catch(e){}
}
function playSfx(name){
  if(!audioCtx) return;
  try{
    var ctx = audioCtx, now = ctx.currentTime, dur = 0.12, vol = 0.18;
    var osc = ctx.createOscillator(), gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    switch(name){
      case "fire":
        osc.type="sawtooth"; osc.frequency.setValueAtTime(800, now);
        osc.frequency.exponentialRampToValueAtTime(200, now+dur*0.6);
        gain.gain.setValueAtTime(0, now);
        gain.gain.linearRampToValueAtTime(vol, now+0.015);
        gain.gain.exponentialRampToValueAtTime(0.001, now+dur);
        break;
      case "mushroom_hit":
        osc.type="sine"; osc.frequency.setValueAtTime(1200, now);
        osc.frequency.exponentialRampToValueAtTime(600, now+dur*0.5);
        gain.gain.setValueAtTime(vol*0.8, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now+dur*0.9);
        break;
      case "enemy_hit":
        osc.type="square"; osc.frequency.setValueAtTime(400, now);
        osc.frequency.exponentialRampToValueAtTime(80, now+dur*0.7);
        gain.gain.setValueAtTime(vol*1.2, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now+dur*0.95);
        break;
      case "player_damage":
        osc.type="sawtooth"; osc.frequency.setValueAtTime(120, now);
        osc.frequency.exponentialRampToValueAtTime(40, now+dur*0.8);
        gain.gain.setValueAtTime(vol*0.6, now);
        gain.gain.linearRampToValueAtTime(0, now+dur*1.2);
        break;
      case "wave_transition":
        osc.type="sine"; osc.frequency.setValueAtTime(300, now);
        osc.frequency.exponentialRampToValueAtTime(600, now+dur*0.7);
        gain.gain.setValueAtTime(vol, now);
        gain.gain.linearRampToValueAtTime(0, now+dur*1.5);
        break;
      case "game_over":
        osc.type="triangle"; osc.frequency.setValueAtTime(400, now);
        osc.frequency.exponentialRampToValueAtTime(60, now+dur*1.2);
        gain.gain.setValueAtTime(vol*0.8, now);
        gain.gain.linearRampToValueAtTime(0, now+dur*1.4);
        break;
    }
    osc.start(now);
    osc.stop(now+dur);
  }catch(e){}
}

// --- start / restart game ---
function startGame(){
  initAudio();
  running = true;
  gameOver = false;
  player.x=160; player.y=H-24; player.invT=0;
  bullets=[]; mush=[]; centi=[]; fleas=[]; spiders=[]; scorpions=[];
  fxPars=[];
  score=0; lives=3; wave=1; spiderSpawnTimer=0; fleaSpawnTimer=0; scorpionSpawnTimer=0;
  centiSpawned=0; centiTarget=Math.min(wave*5+(wave-1)*2,40);
  ovrEl.style.display="none";
  document.getElementById("ovrMsg").style.display="none";
  var ov=document.getElementById("ovr");if(ov){ov.querySelector("h1").textContent="CENITPEDE";var mp=Array.from(ov.querySelectorAll("p")).find(function(p){return p.id!=="ovrMsg"});if(mp)mp.textContent="TAP SCREEN TO START";}
  loop();
}

// --- show game over overlay ---
function showGameOver(){
  gameOver = true;
  running = false;
  var msg = document.getElementById("ovrMsg");
  playSfx("game_over");
  ovrEl.querySelector("h1").textContent = "GAME OVER";
  msg.textContent = "SCORE: " + score + "  |  HIGH: " + highScore;
  msg.style.display = "block";
  ovrEl.style.display = "flex";
}

// --- start next wave ---
function startNextWave(){
  wave++;
  centiSpawned=0;
  // difficulty scales with wave: more segments, faster speed
  centiTarget = Math.min(wave * 5 + (wave-1)*2, 40);
  hudWg.textContent = wave;
  waveBannerT=60;
}

// --- spawn one centipede wave (all segments at once) ---
function spawnWaveCenti(){
  if(centiSpawned >= centiTarget) return;
  var segCount = Math.min(wave * 2 + 3, 18);
  var headY = -8;
  // descend one row every few waves for variety
  if(wave > 1 && centiSpawned % 3 === 0) headY += 8;
    centi.push({
      segments:[], dirX: 1, speed: Math.min(0.9 + wave*0.12, 3.5), t:0, alive:true, mushTurnCooldown: 0,
      x: rnd(-24,W+24), y: headY
    });
  var last = centi[centi.length-1];
  for(var i=0;i<segCount;i++){
    last.segments.push({x:last.x - i*2.5, y:last.y, w:12, h:8});
  }
  centiSpawned++;
}

// --- grid-aligned mushroom placement (stable, no falling) ---
function spawnMush(){
  // fill grid slots that are empty; mushrooms stay in place
  for(var r=0;r<MUSH_ROWS;r++){
    for(var c2=0;c2<MUSH_COLS;c2++){
      var occupied = false;
      for(var i=0;i<mush.length;i++){
        if(mush[i].gR===r && mush[i].gC===c2){occupied=true;break;}
      }
      if(!occupied){
        mush.push({
          x: MUSH_OFF_X + c2*MUSH_CW,
          y: MUSH_OFF_Y + r*MUSH_CH,
          w: 18, h: 14, stemH: 0,
          gR: r, gC: c2,       // grid row/col for stable placement
          poisoned: false,      // bullet damage state
          pTimer: 0             // poison decay timer (ms)
        });
        return;                // one mushroom per frame max
      }
    }
  }
}

// --- apply poison to centipede segments near a poisoned mushroom ---
function tickPoison(dt){
  for(var i=mush.length-1;i>=0;i--){
    var m=mush[i]; if(!m.poisoned) continue;
    m.pTimer += dt;
    if(m.pTimer >= POISON_LIFE){ m.poisoned=false; m.pTimer=0; }
    // damage every centipede segment within 2 cells of the mushroom
    for(var j=centi.length-1;j>=0;j--){
      var c=centi[j]; if(!c||!c.segments[0]) continue;
      for(var k=c.segments.length-1;k>=0;k--){
        var s=c.segments[k];
        var dx=s.x-m.x, dy=s.y-m.y;
        if(Math.abs(dx)<MUSH_CW*2 && Math.abs(dy)<MUSH_CH*2){
          // apply damage: shrink segment size proportionally
          s.w = Math.max(4, s.w - POISON_DMG);
          s.h = Math.max(3, s.h - POISON_DMG/2);
        }
      }
    }
  }
}

// --- fixed-timestep loop ---
var lastT=performance.now(), acc=0, TARGET=16;
function loop(){
  if(!running || gameOver){requestAnimationFrame(loop);return;}
  requestAnimationFrame(loop);
  var now=performance.now(); acc+=now-lastT; lastT=now;
  while(acc>TARGET){update(TARGET); acc-=TARGET;}
  drawGame();
}

// --- update ---
function update(dt){
  // player movement + invincibility timer
  if(keys.ArrowLeft||keys.KeyA) player.x=Math.max(2,player.x-3);
  if(keys.ArrowRight||keys.KeyD) player.x=Math.min(W-2,player.x+3);
  if(keys.ArrowUp||keys.KeyW){player.y=Math.max(8,player.y-3);}
  if(keys.ArrowDown||keys.KeyS){player.y=Math.min(H-player.h/2,player.y+3);}
  if(player.invT > 0){ player.invT -= 16; }
  updateFlash();

  // decrement WAVE banner once per frame; auto-clear when done
  if(waveBannerT > 0){ waveBannerT--; } else { waveBannerT=0; }

  // bullets move up (poisoned bullets travel slower but don't destroy mushrooms)
  for(var i=bullets.length-1;i>=0;i--){
    var b=bullets[i]; b.y-=b.spd;
    if(b.poisoned){ b.pTimer = (b.pTimer||0) + 16; }
    if(b.y<8 || (b.poisoned && b.pTimer>POISON_LIFE)) bullets.splice(i,1);
  }

  // mushrooms: spawn on grid, apply poison from bullets, tick poison damage
  spawnMush();
  for(var i=mush.length-1;i>=0;i--){
    var m=mush[i];
    // bullet hits mushroom → apply poison state (no destruction)
    for(var j=bullets.length-1;j>=0;j--){
      var b=bullets[j]; if(rectHit(b,m)){
        bullets.splice(j,1); score+=5; playSfx("mushroom_hit"); updateHUD();
        m.poisoned = true; m.pTimer = 0;   // poison the mushroom
        break;
      }
    }
    // player hits mushroom → safe: no life loss, just push player back
    if(rectHit(player,m)){
      // nudge player away from mushroom (safe collision)
      var dx=player.x-m.x, dy=player.y-m.y;
      if(Math.abs(dx)>Math.abs(dy)) player.x += (dx>0?4:-4); else player.y += (dy>0?4:-4);
    }
  }

  // tick poison damage on centipedes
  tickPoison(16);

  // spawn centipede segments for current wave (one at a time, spread across frames)
  if(centiSpawned < centiTarget){
    spawnWaveCenti();
  }

  // update all centipede groups and their segments
  for(var i=centi.length-1;i>=0;i--){
    var c=centi[i]; if(!c || !c.segments[0]) continue;
    c.t++;
    // save previous positions before moving anything
    var prev=[];
    for(var pi=0;pi<c.segments.length;pi++) prev.push({x:c.segments[pi].x, y:c.segments[pi].y});
    // head moves horizontally; reverse & descend at screen edges or on mushroom encounter
    var head=c.segments[0];
    // mushroom encounter with cooldown gate: only reverse when mushTurnCooldown <= 0
    if(c.mushTurnCooldown > 0){c.mushTurnCooldown--;} else {
      for(var mi=0;mi<mush.length;mi++){
        var m=mush[mi]; if(!m) continue;
        var aheadX = head.x + c.dirX*c.speed;
        var overlap = (c.dirX>0 && m.x < aheadX+12 && m.x+m.w > aheadX-8) ||
                      (c.dirX<0 && m.x > aheadX-12 && m.x+m.w < aheadX+8);
        if(overlap){
          c.dirX *= -1;
          head.y += MUSH_CH;
          c.mushTurnCooldown = 12;
          break;
        }
      }
    }
    // edge reversal: screen boundaries → reverse & descend
    if(head.x + c.dirX*c.speed < -8 || head.x + c.dirX*c.speed > W+24){
      c.dirX *= -1;
      head.y += 8;
    }
    head.x += c.dirX * c.speed;
    // each segment follows the prior segment's previous position
    for(var j=1;j<c.segments.length;j++){
      var s2=c.segments[j], pp=prev[j-1];
      if(pp){
        var dx=pp.x-s2.x, dy=pp.y-s2.y;
        var dist=Math.sqrt(dx*dx+dy*dy);
        if(dist>0){var step=Math.min(c.speed,dist);s2.x+=dx/dist*step;s2.y+=dy/dist*step;}
      }
    }

    // bullet hits centipede segment -> split into independent chasers
      for(var bi=bullets.length-1;bi>=0;bi--){
        var b=bullets[bi]; if(!b) continue;
        for(var sk=c.segments.length-1;sk>=0;sk--){
          var seg=c.segments[sk];
          if(rectHit(b,seg)){
            bullets.splice(bi,1); score+=50; playSfx("enemy_hit"); updateHUD();
            spawnBurst(seg.x, seg.y, "#af5", 6); // bullet-hit feedback
            triggerFlash("#fff");                // white flash on hit
          c.segments.splice(sk,1);
          centi.push({
            segments:[{x:seg.x+wave*4, y:Math.max(40,H/2), w:seg.w, h:seg.h}],
            dirX: 1, speed: 0.8, t:0, alive:true, mushTurnCooldown: 0, x: seg.x+wave*4, y: Math.max(40,H/2)
          });
          break; // bullet consumed, stop checking this bullet
        }
      }
    }

    // if all segments destroyed, mark for cleanup
    if(c.segments.length === 0) c.alive = false;
  }

  // remove dead centipede groups and off-screen chasers in one pass
  for(var i=centi.length-1;i>=0;i--){
    var c=centi[i]; if(!c || !c.segments[0]) continue;
    var head=c.segments[0];
    if(!c.alive || head.x < -24 || head.x > W+24) centi.splice(i,1);
  }

    // player vs centipede segments -> lose life (with invincibility frames)
    for(var j=centi.length-1;j>=0;j--){
      var c=centi[j]; if(!c || !c.segments[0]) continue;
      var head=c.segments[0];
      if(rectHit(player,head) && player.invT<=0){
        playSfx("player_damage");
        lives--; updateHUD(); triggerFlash("#f44"); player.invT = 2000; break;
      }
    }

  // spiders: deterministic spawn, hunt player, bullet collision, player collision, cleanup
  spiderSpawnTimer++;
  if(spiderSpawnTimer >= SPIDER_SPAWN_INTERVAL && spiders.length < 4){
    spiderSpawnTimer = 0;
    var side = Math.random() < 0.5 ? -12 : W + 12;
    spiders.push({ x: side, y: rnd(20, H - 40), w: 14, h: 10, dirX: side < 0 ? 1 : -1 });
  }
  for(var si=spiders.length-1;si>=0;si--){
    var sp=spiders[si]; if(!sp) continue;
    // hunt player when in range, else drift toward center
    var hdx=player.x-sp.x, hdy=player.y-sp.y;
    var hdist=Math.sqrt(hdx*hdx+hdy*hdy);
    if(hdist < SPIDER_HUNT_RANGE){
      sp.dirX = hdx > 0 ? 1 : -1;
      sp.y += (hdy > 0 ? 1 : -1) * SPIDER_SPEED * 0.6;
    } else {
      // drift toward player y slowly
      if(player.y - sp.y > 4) sp.y += 0.5;
      else if(sp.y - player.y > 4) sp.y -= 0.5;
    }
    sp.x += sp.dirX * SPIDER_SPEED;
    // bullet hits spider -> score + remove
    for(var bi2=bullets.length-1;bi2>=0;bi2--){
      var b2=bullets[bi2]; if(!b2) continue;
      if(rectHit(b2,sp)){
        bullets.splice(bi2,1); playSfx("enemy_hit"); spiders.splice(si,1); score+=SPIDER_SCORE; updateHUD(); spawnBurst(sp.x, sp.y, "#a7d", 6); break;
      }
    }
    // player hits spider -> lose life with invincibility
    if(rectHit(player,sp) && player.invT<=0){
      lives--; updateHUD(); player.invT=2000; break;
    }
    // cleanup off-screen
    if(sp.x < -30 || sp.x > W+30) spiders.splice(si,1);
  }

  // fleas: deterministic spawn every 900 frames, capped at FLEA_MAX
  fleaSpawnTimer++;
  if(fleaSpawnTimer >= FLEA_SPAWN_INTERVAL && fleas.length < FLEA_MAX){
    fleaSpawnTimer = 0;
    fleas.push({ x: rnd(16,W-16), y: -12, w: 14, h: 8, killed: false });
  }
  for(var fi=fleas.length-1;fi>=0;fi--){
    var fl=fleas[fi]; if(!fl) continue;
    // move vertically downward
    fl.y += FLEA_SPEED;
    // when crossing a mushroom row, spawn a mushroom only if that grid slot is empty
    for(var fr=0;fr<MUSH_ROWS;fr++){
      var rowY = MUSH_OFF_Y + fr*MUSH_CH;
      if(fl.y >= rowY && fl.y < rowY + FLEA_SPEED + 2){
        for(var fc=0;fc<MUSH_COLS;fc++){
          var slotX = MUSH_OFF_X + fc*MUSH_CW;
          if(Math.abs(fl.x - slotX) < MUSH_CW/2 + 4){
            var occupied = false;
            for(var mi=0;mi<mush.length;mi++){
              if(mush[mi].gR===fr && mush[mi].gC===fc){occupied=true;break;}
            }
            if(!occupied){
              mush.push({
                x: slotX, y: rowY, w: 18, h: 14, stemH: 0,
                gR: fr, gC: fc, poisoned: false, pTimer: 0
              });
            }
            break;
          }
        }
      }
    }
    // bullet hits flea -> score + remove (once)
    for(var bfi=bullets.length-1;bfi>=0;bfi--){
      var bf=bullets[bfi]; if(!bf) continue;
      if(rectHit(bf,fl)){
        bullets.splice(bfi,1);
        playSfx("enemy_hit");
        spawnBurst(fl.x, fl.y, "#fa5", 6); // bullet-hit feedback
        if(!fl.killed){ fl.killed = true; score += FLEA_SCORE; updateHUD(); }
        fleas.splice(fi,1); break;
      }
    }
    // player hits flea -> lose life with invincibility
    if(rectHit(player,fl) && player.invT<=0){
      lives--; updateHUD(); player.invT=2000; break;
    }
    // cleanup off-screen (bottom)
    if(fl.y > H+16) fleas.splice(fi,1);
  }

  // scorpions: deterministic spawn every 1200 frames during active play, capped at 1
  scorpionSpawnTimer++;
  if(scorpionSpawnTimer >= SCORPION_SPAWN_INTERVAL && running && !gameOver && scorpions.length < 1){
    scorpionSpawnTimer = 0;
    var side = Math.random() < 0.5 ? -12 : W + 12;
    scorpions.push({ x: side, y: rnd(30, H-40), w: 22, h: 14, dirX: side < 0 ? 1 : -1, killed: false });
  }
  for(var sci=scorpions.length-1;sci>=0;sci--){
    var sc=scorpions[sci]; if(!sc) continue;
    // horizontal movement across playfield
    sc.x += sc.dirX * SCORPION_SPEED;
    // poison mushrooms it crosses (set poisoned=true, reset pTimer)
    for(var mi2=mush.length-1;mi2>=0;mi2--){
      var mc=mush[mi2];
      if(Math.abs(sc.x - mc.x) < MUSH_CW && Math.abs(sc.y - mc.y) < MUSH_CH){
        mc.poisoned = true; mc.pTimer = 0;
      }
    }
    // bullet hits scorpion -> score + remove (once)
    for(var bsi=bullets.length-1;bsi>=0;bsi--){
      var bs2=bullets[bsi]; if(!bs2) continue;
      if(rectHit(bs2,sc)){
        bullets.splice(bsi,1);
        playSfx("enemy_hit");
        spawnBurst(sc.x, sc.y, "#a7d", 6); // bullet-hit feedback
        if(!sc.killed){ sc.killed = true; score += SCORPION_SCORE; updateHUD(); }
        scorpions.splice(sci,1); break;
      }
    }
    // player hits scorpion -> lose life with existing invulnerability
    if(rectHit(player,sc) && player.invT<=0){
      lives--; updateHUD(); player.invT=2000; break;
    }
    // cleanup off-screen
    if(sc.x < -30 || sc.x > W+30) scorpions.splice(sci,1);
  }

  // check life loss -> game over or respawn
  if(lives <= 0){
    showGameOver();
    return;
  }

  // wave completion: all centipede segments destroyed and spawn queue empty
  if(centi.length === 0 && centiSpawned >= centiTarget && centiTarget > 0){
    playSfx("wave_transition");
    startNextWave();
  }

  updateHUD();
  updateFx();
}

// --- WAVE banner (centered on canvas for ~60 frames after wave++ ) ---
function drawWaveBanner(){
  if(waveBannerT<=0) return;
  ctx.save();
  var fade = Math.min(1, waveBannerT / 24); // ease-in over first quarter of remaining frames
  ctx.fillStyle="rgba(255,170,20,"+fade+")";
  ctx.fillRect(0,0,W,H);
  ctx.save();
  ctx.font="bold 16px monospace";ctx.textAlign="center";
  ctx.fillStyle="#ff9";
  ctx.fillText("WAVE "+wave,W/2,H/2);
  ctx.restore();
  ctx.restore();
}

// --- draw ---
function drawGame(){
  ctx.fillStyle="#0d3b1f"; ctx.fillRect(0,0,W,H);
  // grid lines
  ctx.strokeStyle="rgba(0,200,80,.15)"; ctx.lineWidth=.5;
  for(var gy=4;gy<H;gy+=4){var ly=W*gy/H;ctx.beginPath();ctx.moveTo(ly,0);ctx.lineTo(ly,H);ctx.stroke()}

  // mushrooms (grid-aligned, poisoned ones glow purple)
  for(var m of mush){
    var baseColor = m.poisoned ? "#83a" : "#6B2";
    ctx.fillStyle=baseColor; ctx.fillRect(m.x-m.w/2,m.y-4,m.w,m.h);
    ctx.fillStyle=m.poisoned?"#619":"#3a0";
    var cy=m.y-2;
    ctx.beginPath();ctx.arc(m.x,cy,m.w/2,Math.PI,true);ctx.fill()
  }

  // centipedes — red segmented bodies
  for(var c of centi){
    if(!c||!c.segments[0]) continue;
    ctx.fillStyle="#a33";
    for(var s of c.segments){
      ctx.fillRect(s.x-s.w/2,s.y-s.h/2,s.w,s.h);
      ctx.strokeStyle="#810";ctx.lineWidth=.5;ctx.strokeRect(s.x-s.w/2,s.y-s.h/2,s.w,s.h)
    }
  }

  // individual chasers (red dots with trail)
  for(var i=centi.length-1;i>=0;i--){
    var s=centi[i]; if(!s||!s.alive) continue;
    ctx.fillStyle="#c44";ctx.fillRect(s.x-s.w/2,s.y-s.h/2,s.w,s.h);
  }

  // spiders — dark body with 8 legs and two eyes, hunts player when close
  for(var spi of spiders){
    ctx.fillStyle="#2a1";ctx.fillRect(spi.x-spi.w/2,spi.y-spi.h/2,spi.w,spi.h);
    ctx.strokeStyle="#5c3";ctx.lineWidth=.6;
    var legOff=spi.dirX>0?-2:2;
    for(var li=0;li<4;li++){
      var lx=spi.x-spi.w/2+3+li*3, ly=spi.y;
      ctx.beginPath();ctx.moveTo(lx,ly-1);ctx.lineTo(lx+legOff,ly-5);ctx.stroke();
      ctx.beginPath();ctx.moveTo(lx,ly+1);ctx.lineTo(lx+legOff,ly+5);ctx.stroke();
    }
    ctx.fillStyle="#f00";ctx.fillRect(spi.x-3,spi.y-2,2,2);ctx.fillRect(spi.x+1,spi.y-2,2,2);
  }

  // fleas — small brown bodies with six legs, hop downward
  for(var fli of fleas){
    ctx.fillStyle="#654";ctx.fillRect(fli.x-fli.w/2,fli.y-fli.h/2,fli.w,fli.h);
    ctx.strokeStyle="#432";ctx.lineWidth=.6;
    var fleg=0.8;
    for(var fli2=0;fli2<3;fli2++){
      var flx=fli.x-fli.w/2+2+fli2*4, fly=fli.y;
      ctx.beginPath();ctx.moveTo(flx,fly-1);ctx.lineTo(flx+fleg,fly-5);ctx.stroke();
      ctx.beginPath();ctx.moveTo(flx,fly+1);ctx.lineTo(flx+fleg,fly+5);ctx.stroke();
    }
    ctx.fillStyle="#321";ctx.fillRect(fli.x-2,fli.y-1,1,1);ctx.fillRect(fli.x+1,fli.y-1,1,1);
  }

  // scorpions — procedural purple body with pincers, legs, and stinger tail
  for(var sci of scorpions){
    var sx=sc.x, sy=sc.y;
    ctx.fillStyle="#639";ctx.fillRect(sx-8,sy-5,16,10);
    ctx.fillStyle="#74a";ctx.fillRect(sx-12,sy-3,4,6);
    ctx.strokeStyle="#96c";ctx.lineWidth=.6;
    for(var sli=0;sli<4;sli++){
      var slx=sx-5+sli*4, sly=sy;
      ctx.beginPath();ctx.moveTo(slx,sly-1);ctx.lineTo(slx+2,sly-6);ctx.stroke();
      ctx.beginPath();ctx.moveTo(slx,sly+1);ctx.lineTo(slx+2,sly+6);ctx.stroke();
    }
    var pDir = sc.dirX > 0 ? -1 : 1;
    ctx.strokeStyle="#a8f";ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(sx+pDir*7,sy-4);ctx.lineTo(sx+pDir*13,sy-7);ctx.stroke();
    ctx.beginPath();ctx.moveTo(sx+pDir*7,sy+4);ctx.lineTo(sx+pDir*13,sy+7);ctx.stroke();
    ctx.strokeStyle="#b9f";ctx.lineWidth=.8;
    ctx.beginPath();ctx.moveTo(sx-sci.dirX*8,sy);ctx.quadraticCurveTo(sx-sci.dirX*14,sy-6,sx-sci.dirX*16,sy-2);ctx.stroke();
    ctx.fillStyle="#d0f";ctx.fillRect(sx-sci.dirX*17,sy-3,2,2);
  }

  // bullets — yellow (regular) or purple (poisoned) sparks
  for(var b of bullets){
    ctx.fillStyle=b.poisoned?"#a6f":"#ff6"; ctx.beginPath();ctx.arc(b.x,b.y+3,3,0,Math.PI*2);ctx.fill()
  }

  // player ship (blue with glow, flashes when invincible)
  var pAlpha = player.invT > 0 ? (Math.floor(player.invT/150)%2===0?0.3:1) : 1;
  ctx.globalAlpha=pAlpha;
  ctx.strokeStyle="#9cf"; ctx.lineWidth=1; ctx.strokeRect(player.x-14,player.y,28,8);
  ctx.fillStyle="#3af"; ctx.fillRect(player.x-14,player.y,28,8);
  ctx.globalAlpha=1;

  // particles — drawn after entities so they are visible
  drawFx();

  // screen-flash overlay (on top of all game entities and particles)
  drawFlash();
  drawWaveBanner();
}

// --- HUD ---
function updateHUD(){
  if(score>highScore){highScore=score;try{localStorage.setItem("cenitpede_hs",String(highScore))}catch(e){}}
  hudSc.textContent=score;hudLv.textContent=lives;hudWg.textContent=wave;
  document.getElementById("hs").textContent=highScore;
}

})(); // IIFE ends
</script>
